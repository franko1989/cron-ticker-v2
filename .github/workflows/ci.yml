name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'

      - name: Instalar Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

      - name: Coverage
        run: npm run test:coverage

      - name: Linter
        run: npm run lint

      - name: Build
        run: npm run build