name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: "22.21.1"
  APP_NAME: "cron-ticker-v2"

jobs:
    #-----------job 1 LINT----------------
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: ${{ env.NODE_VERSION }}
            - run: npm ci
            - run: npm run lint
    #-----------job 2 LINT----------------
    test:
        name: Test
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: ${{ env.NODE_VERSION }}
            - run: npm ci
            - name: Run tests with coverage
              run: npm run test:coverage
    #-----------job 3 LINT----------------
    build:
        name: Build
        runs-on: ubuntu-latest
        needs: test
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
            - run: npm ci
            - run: npm run build
   