name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: "22.21.1"
  APP_NAME: "cron-ticker-v2"

jobs:

    #-----------job 3 LINT----------------
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                 node-version: ${{ env.NODE_VERSION }}
                 cache: 'npm'
            - run: npm ci
            - name: Build App
              run: npm run build
              env:
                APP_VERSION: ${{ vars.APP_VERSION || '1.0.0' }}
            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v4
              with:
                name: build-${{github.sha}}
                path: dist/
                retention-days: 5 
    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Download build
              uses: actions/download-artifact@v4
              with:
                name: build-${{github.sha}}
                path: dist/
                
            - name: Deploy Logs
              run: |
                echo "Deploying: ${cat dist/build-info.json}" 